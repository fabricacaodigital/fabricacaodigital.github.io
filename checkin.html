<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Check-in Maker CEFET</title>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background-color: #1a1a1a; color: white; margin: 0; display: flex; justify-content: center; align-items: center; height: 100vh; text-align: center; }
        .container { background: #2d2d2d; padding: 30px; border-radius: 15px; box-shadow: 0 10px 30px rgba(0,0,0,0.5); width: 90%; max-width: 400px; }
        h1 { margin-top: 0; font-size: 1.5em; color: #fff; }
        
        .loading { font-size: 1.2em; color: #f1c40f; animation: piscar 1s infinite; }
        @keyframes piscar { 50% { opacity: 0.5; } }

        .tela-sucesso { display: none; background-color: #28a745; padding: 20px; border-radius: 10px; margin-top: 20px;}
        .tela-erro { display: none; background-color: #dc3545; padding: 20px; border-radius: 10px; margin-top: 20px; font-weight: bold; font-size: 1.2em;}
        
        .guest-name { font-size: 1.6em; font-weight: bold; margin: 10px 0 5px 0; }
        .guest-facul { font-size: 1.1em; color: #e6f0fa; margin-bottom: 20px; }
        
        .oficinas-box { background: rgba(0,0,0,0.2); padding: 15px; border-radius: 8px; text-align: left; margin-top: 15px;}
        .oficinas-box h3 { margin: 0 0 10px 0; font-size: 1em; border-bottom: 1px solid rgba(255,255,255,0.3); padding-bottom: 5px;}
        .oficinas-box ul { list-style-type: none; padding: 0; margin: 0; }
        .oficinas-box li { background: #003366; margin-bottom: 5px; padding: 8px; border-radius: 5px; font-weight: bold; font-size: 0.9em;}
    </style>
</head>
<body>

<div class="container">
    <h1>Controle de Portaria</h1>
    
    <div id="loading" class="loading">⏳ Lendo Ingresso...</div>
    
    <div id="sucesso" class="tela-sucesso">
        <div>✅ ACESSO LIBERADO</div>
        <div class="guest-name" id="nomePessoa">Nome da Pessoa</div>
        <div class="guest-facul" id="faculPessoa">Faculdade</div>
        
        <div class="oficinas-box">
            <h3>Oficinas Escolhidas:</h3>
            <ul id="listaOficinas">
                </ul>
        </div>
    </div>

    <div id="erro" class="tela-erro">
        <span id="mensagemErro">Erro Desconhecido</span>
    </div>
</div>

<script>
    // A API OFICIAL DO SEU EVENTO JÁ INSERIDA AQUI
    const API_URL = "https://script.google.com/macros/s/AKfycbx69v6w_jC6Nwz9eC7pnD6ES-zu-K3R457UI_RLlrBnOL_dyT0v18cFJBdxjUYKnRYN6g/exec"; 

    window.onload = async function() {
        // Pega o ID que veio no Link do QR Code (Ex: ?id=CF001)
        const params = new URLSearchParams(window.location.search);
        const idIngresso = params.get('id');

        if(!idIngresso) {
            document.getElementById('loading').style.display = 'none';
            document.getElementById('erro').style.display = 'block';
            document.getElementById('mensagemErro').innerText = "❌ QR Code Inválido (Sem ID)";
            return;
        }

        try {
            // Manda o ID pro Google Sheets conferir
            const response = await fetch(API_URL, {
                method: 'POST',
                body: JSON.stringify({ id: idIngresso })
            });
            
            const result = await response.json();
            document.getElementById('loading').style.display = 'none';

            if(result.sucesso) {
                // Se der bom, mostra a tela verde com o nome e as oficinas
                document.getElementById('sucesso').style.display = 'block';
                document.getElementById('nomePessoa').innerText = result.nome;
                document.getElementById('faculPessoa').innerText = result.instituicao;
                
                const ul = document.getElementById('listaOficinas');
                result.oficinas.forEach(oficina => {
                    if(oficina) {
                        let li = document.createElement('li');
                        li.innerText = "🔧 " + oficina;
                        ul.appendChild(li);
                    }
                });
            } else {
                // Se o cara já entrou ou passou 3 dias, mostra a tela vermelha
                document.getElementById('erro').style.display = 'block';
                document.getElementById('mensagemErro').innerText = result.mensagem;
            }

        } catch(error) {
            document.getElementById('loading').style.display = 'none';
            document.getElementById('erro').style.display = 'block';
            document.getElementById('mensagemErro').innerText = "Erro de conexão com a portaria.";
        }
    };
</script>
</body>
</html>
