<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Painel Autolaser - CEFET/RJ</title>
    <style>
        /* ================= CORES E TEMAS ================= */
        :root {
            --bg-body: #f4f7f6;
            --bg-container: #ffffff;
            --text-main: #333333;
            --primary-color: #003366;
            --secondary-color: #e6f0fa;
            --input-bg: #ffffff;
            --input-border: #cccccc;
            --input-text: #333333;
            --status-pendente: #ffc107;
            --status-usinagem: #17a2b8;
            --status-concluido: #28a745;
        }

        [data-theme="black-white"] {
            --bg-body: #121212;
            --bg-container: #1e1e1e;
            --text-main: #ffffff;
            --primary-color: #ffffff;
            --secondary-color: #333333;
            --input-bg: #2d2d2d;
            --input-border: #555555;
            --input-text: #ffffff;
        }

        [data-theme="purple-white"] {
            --bg-body: #faf5ff;
            --bg-container: #ffffff;
            --text-main: #333333;
            --primary-color: #7e22ce;
            --secondary-color: #f3e8ff;
            --input-bg: #ffffff;
            --input-border: #cccccc;
            --input-text: #333333;
        }

        [data-theme="pink-white"] {
            --bg-body: #fdf2f8;
            --bg-container: #ffffff;
            --text-main: #333333;
            --primary-color: #db2777;
            --secondary-color: #fce7f3;
            --input-bg: #ffffff;
            --input-border: #cccccc;
            --input-text: #333333;
        }

        [data-theme="custom"] {
            --bg-body: #f5f5f5;
            --bg-container: #ffffff;
            --text-main: #333333;
            --secondary-color: #eeeeee;
            --input-bg: #ffffff;
            --input-border: #cccccc;
            --input-text: #333333;
        }

        /* ================= ESTILOS GERAIS ================= */
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background-color: var(--bg-body); margin: 0; padding: 20px 10px; color: var(--text-main); transition: all 0.3s ease; }
        
        .container { margin: 0 auto; background-color: var(--bg-container); padding: 30px; border-radius: 10px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); transition: all 0.3s ease; box-sizing: border-box; }
        .view-desktop { max-width: 1300px; }
        .view-tablet { max-width: 768px; }
        .view-smartphone { max-width: 400px; padding: 20px 15px; }
        
        .header-bar { display: flex; justify-content: space-between; align-items: center; border-bottom: 2px solid var(--primary-color); padding-bottom: 10px; margin-bottom: 20px; flex-wrap: wrap; gap: 15px;}
        h1 { color: var(--primary-color); margin: 0; font-size: 1.6em; }
        
        .controls-panel { display: flex; gap: 10px; align-items: center; flex-wrap: wrap; }
        .styled-select { padding: 8px; border-radius: 5px; border: 1px solid var(--input-border); background-color: var(--input-bg); color: var(--input-text); cursor: pointer; font-weight: bold; font-size: 0.85em; }
        #customColorPicker { height: 35px; width: 45px; padding: 0; border: none; cursor: pointer; border-radius: 5px; background: none; }
        
        .form-group { display: flex; gap: 15px; margin-bottom: 20px; flex-wrap: wrap; }
        .form-group > div { flex: 1; min-width: 150px; }
        label { display: block; margin-bottom: 5px; font-weight: bold; font-size: 0.9em; }
        input, select, textarea { width: 100%; padding: 10px; border: 1px solid var(--input-border); border-radius: 5px; box-sizing: border-box; font-family: inherit; background-color: var(--input-bg); color: var(--input-text); }
        input[type="file"] { padding: 7px; background-color: var(--input-bg); }
        textarea { resize: vertical; }
        
        button { background-color: var(--primary-color); color: var(--bg-container); border: none; cursor: pointer; font-weight: bold; transition: opacity 0.3s; margin-top: 24px; padding: 12px; border-radius: 5px; }
        button:hover { opacity: 0.8; }
        button:disabled { background-color: #999; cursor: not-allowed; }
        
        #btnModoAdmin { background-color: #6c757d; margin-top: 0; width: auto; padding: 8px 15px; color: white; }
        
        .table-wrapper { overflow-x: auto; width: 100%; border-radius: 5px; border: 1px solid var(--input-border); }
        table { width: 100%; border-collapse: collapse; min-width: 900px; } 
        th, td { padding: 12px 10px; text-align: left; border-bottom: 1px solid var(--input-border); font-size: 0.85em; }
        th { background-color: var(--secondary-color); color: var(--primary-color); position: sticky; top: 0; }
        
        .status-badge { padding: 6px 10px; border-radius: 15px; font-size: 0.8em; font-weight: bold; color: #111; display: inline-block; text-align: center; }
        .pendente { background-color: var(--status-pendente); }
        .usinagem { background-color: var(--status-usinagem); color: white; }
        .concluido { background-color: var(--status-concluido); color: white; }
        
        .action-btn { padding: 6px 8px; margin: 2px 0; border: none; border-radius: 3px; cursor: pointer; font-size: 0.8em; width: 100%; color: white;}
        .btn-avancar { background-color: var(--primary-color); }
        .btn-deletar { background-color: #dc3545; }
        .btn-download { background-color: #6c757d; color: white; text-decoration: none; padding: 6px 10px; border-radius: 3px; display: inline-block; font-size: 0.8em; text-align: center; }
        .btn-download:hover { opacity: 0.8; }
        
        .btn-wpp { background-color: #25D366; color: white; text-decoration: none; padding: 6px 8px; border-radius: 3px; display: inline-flex; align-items: center; justify-content: center; font-size: 0.8em; margin-top: 4px; width: 100%; font-weight: bold; box-sizing: border-box; gap: 5px;}
        .btn-wpp:hover { background-color: #128C7E; }

        .view-smartphone .header-bar { flex-direction: column; align-items: stretch; }
        .view-smartphone .controls-panel { justify-content: space-between; }
        .view-smartphone h1 { text-align: center; font-size: 1.4em; }
        .view-smartphone .form-group > div { min-width: 100%; }
        .view-smartphone button { margin-top: 10px; }

        /* ================= ESTILOS DOS JOGOS SECORETOS ================= */
        #arcadeContainer { display: none; max-width: 500px; margin: 30px auto; background: #111; color: #fff; font-family: 'Courier New', Courier, monospace; border: 4px solid #333; padding: 20px; border-radius: 10px; text-align: center; box-shadow: 0 0 20px rgba(0,0,0,0.5); }
        .arcade-btn-close { background-color: #dc3545; color: white; border: none; padding: 8px 15px; border-radius: 5px; cursor: pointer; font-weight: bold; margin-bottom: 15px; font-family: sans-serif;}
        
        /* Jogo 1: Cobrinha */
        #snakeCanvas { background-color: #000; border: 2px solid #00ff00; display: block; margin: 15px auto; }
        #snakeScoreText { color: #00ff00; font-weight: bold; }

        /* Jogo 2: Flappy Bird */
        #flappyCanvas { background-color: #70c5ce; border: 2px solid #333; display: block; margin: 15px auto; cursor: pointer; }
        #flappyScoreText { color: #fff; font-weight: bold; }
    </style>
</head>
<body>

<!-- CONTEÚDO PRINCIPAL DO PAINEL -->
<div id="panelContent">
    <div id="mainContainer" class="container view-desktop">
        <div class="header-bar">
            <h1>Painel Autolaser</h1>
            
            <div class="controls-panel">
                <select id="viewSelector" class="styled-select" onchange="changeViewMode()" title="Modo de Visualização">
                    <option value="auto">🤖 Auto (Detectar)</option>
                    <option value="view-desktop">💻 Forçar PC</option>
                    <option value="view-tablet">📱 Forçar Tablet</option>
                    <option value="view-smartphone">📱 Forçar Celular</option>
                </select>

                <select id="themeSelector" class="styled-select" onchange="changeTheme()" title="Cor do Tema">
                    <option value="default">Branco e Azul</option>
                    <option value="black-white">Preto e Branco</option>
                    <option value="purple-white">Roxo c/ Branco</option>
                    <option value="pink-white">Rosa c/ Branco</option>
                    <option value="custom">🎨 Personalizar</option>
                </select>
                
                <input type="color" id="customColorPicker" style="display:none;" oninput="applyCustomColor()" title="Escolha sua cor">
                
                <button id="btnModoAdmin" onclick="toggleAdmin()">🔓 Administrador</button>
            </div>
        </div>
        
        <form id="orderForm">
            <div class="form-group">
                <div style="flex: 2;">
                    <label for="peca">Nome do Projeto</label>
                    <input type="text" id="peca" placeholder="Ex: Chassi Duna" required>
                </div>
                <div>
                    <label for="material">Material (Laser)</label>
                    <select id="material" required>
                        <option value="">Selecione...</option>
                        <option value="MDF">MDF</option>
                        <option value="Acrílico">Acrílico</option>
                        <option value="Papelão">Papelão</option>
                    </select>
                </div>
                <div style="flex: 0.5;">
                    <label for="quantidade">Qtd</label>
                    <input type="number" id="quantidade" min="1" value="1" required>
                </div>
            </div>
            
            <div class="form-group">
                <div>
                    <label for="entrega">Data de Retirada</label>
                    <input type="date" id="entrega" required>
                </div>
                <div>
                    <label for="hora">Hora de Retirada</label>
                    <input type="time" id="hora" required>
                </div>
                <div style="flex: 1.5;">
                    <label for="solicitante">Equipe / Solicitante</label>
                    <input type="text" id="solicitante" required>
                </div>
                <div style="flex: 1.5;">
                    <label for="contato">WhatsApp (Apenas Números)</label>
                    <input type="tel" id="contato" placeholder="Ex: 21999999999" pattern="[0-9]{10,11}" title="Apenas DDD e número." required>
                </div>
            </div>

            <div class="form-group">
                <div style="flex: 2;">
                    <label for="obs">Observações Adicionais (Opcional)</label>
                    <textarea id="obs" rows="2" placeholder="Ex: Cortar na espessura de 3mm..."></textarea>
                </div>
                <div style="flex: 2;">
                    <label for="arquivo">Arquivo (Vários formatos aceitos)</label>
                    <input type="file" id="arquivo" accept=".svg,.dxf,.plt,.ai,.bmp,.jpg,.jpeg,.png,.nc,.step,.stl,.webp,.dst,.gif" required>
                </div>
                <div style="flex: 1;">
                    <button type="submit" id="btnSubmit">Enviar Pedido</button>
                </div>
            </div>
        </form>

        <div class="table-wrapper">
            <table id="ordersTable">
                <thead>
                    <tr>
                        <th>Data Pedido</th>
                        <th>Retirada</th>
                        <th>Projeto / Obs</th>
                        <th>Material</th>
                        <th>Qtd</th>
                        <th>Solicitante</th>
                        <th>Contato</th>
                        <th>Arquivo</th>
                        <th>Status</th>
                        <th>Ações</th>
                    </tr>
                </thead>
                <tbody id="tableBody">
                    <tr><td colspan="10" style="text-align:center;">Conectando com o servidor...</td></tr>
                </tbody>
            </table>
        </div>
    </div>
</div>

<!-- CONTAINER DO MODO ARCADE FLIPERAMA (ESCONDIDO) -->
<div id="arcadeContainer">
    <button class="arcade-btn-close" onclick="fecharArcade()">✖ Fechar Jogo e Voltar</button>
    <div id="gameTitle"><h2>MODO ARCADE SEGRETO</h2></div>
    
    <!-- Tela do Jogo 1 (Cobrinha) -->
    <div id="gameSnakeContainer" style="display:none;">
        <p style="color:#00ff00;">Use as setas do teclado para guiar a cobrinha!</p>
        <canvas id="snakeCanvas" width="300" height="300"></canvas>
        <p id="snakeScoreText">Pontos: <span id="snakeScore">0</span></p>
    </div>

    <!-- Tela do Jogo 2 (Flappy Bird) -->
    <div id="gameFlappyContainer" style="display:none;">
        <p>Toque na tela ou use a Barra de Espaço para voar!</p>
        <canvas id="flappyCanvas" width="300" height="400"></canvas>
        <p id="flappyScoreText">Pontos: <span id="flappyScore">0</span></p>
    </div>
</div>

<script>
    const API_URL = "https://script.google.com/macros/s/AKfycbzfm6pyVHJC3NlE_vFEnXUmuN8m_N4qncYQem5KJZ7Vqj5OCCgZofubtKN3eAOk4Duilw/exec"; 

    const tableBody = document.getElementById('tableBody');
    const orderForm = document.getElementById('orderForm');
    const arquivoInput = document.getElementById('arquivo');
    const btnSubmit = document.getElementById('btnSubmit');
    const inputEntrega = document.getElementById('entrega');
    
    const themeSelector = document.getElementById('themeSelector');
    const customColorPicker = document.getElementById('customColorPicker');
    const viewSelector = document.getElementById('viewSelector');
    const mainContainer = document.getElementById('mainContainer');
    
    let senhaAdminLogado = "";

    const svgWhatsApp = `<svg xmlns="http://www.w3.org/2000/svg" width="14" height="14" fill="currentColor" viewBox="0 0 16 16"><path d="M13.601 2.326A7.854 7.854 0 0 0 7.994 0C3.627 0 .068 3.558.064 7.926c0 1.399.366 2.76 1.057 3.965L0 16l4.204-1.102a7.933 7.933 0 0 0 3.79.965h.004c4.368 0 7.926-3.558 7.93-7.93A7.898 7.898 0 0 0 13.6 2.326zM7.994 14.521a6.573 6.573 0 0 1-3.356-.92l-.24-.144-2.494.654.666-2.433-.156-.251a6.56 6.56 0 0 1-1.007-3.505c0-3.626 2.957-6.584 6.591-6.584a6.56 6.56 0 0 1 4.66 1.931 6.557 6.557 0 0 1 1.928 4.66c-.004 3.639-2.961 6.592-6.592 6.592zm3.615-4.934c-.197-.099-1.17-.578-1.353-.646-.182-.065-.315-.099-.445.099-.133.197-.513.646-.627.775-.114.133-.232.148-.43.05-.197-.1-.836-.308-1.592-.985-.59-.525-.985-1.175-1.103-1.372-.114-.198-.011-.304.088-.403.087-.088.197-.232.296-.346.1-.114.133-.198.198-.33.065-.134.034-.248-.015-.347-.05-.099-.445-1.076-.612-1.47-.16-.389-.323-.335-.445-.34-.114-.007-.247-.007-.38-.007a.729.729 0 0 0-.529.247c-.182.198-.691.677-.691 1.654 0 .977.71 1.916.81 2.049.098.133 1.394 2.132 3.383 2.992.47.205.84.326 1.129.418.475.152.904.129 1.246.08.38-.058 1.171-.48 1.338-.943.164-.464.164-.86.114-.943-.049-.084-.182-.133-.38-.232z"/></svg>`;

    window.onload = function() {
        const savedTheme = localStorage.getItem('cncTheme') || 'default';
        themeSelector.value = savedTheme;
        changeTheme();

        if (savedTheme === 'custom') {
            const savedColor = localStorage.getItem('cncCustomColor') || '#003366';
            customColorPicker.value = savedColor;
            applyCustomColor();
        }

        const savedView = localStorage.getItem('cncViewMode') || 'auto';
        viewSelector.value = savedView;
        changeViewMode();

        const hoje = new Date();
        hoje.setDate(hoje.getDate() + 2); 
        const minData = hoje.toISOString().split('T')[0];
        
        inputEntrega.min = minData;
        inputEntrega.max = "2026-12-31"; 
    };

    function applyAutoView() {
        const screenWidth = window.innerWidth;
        if (screenWidth <= 600) {
            mainContainer.className = 'container view-smartphone';
        } else if (screenWidth <= 1024) {
            mainContainer.className = 'container view-tablet';
        } else {
            mainContainer.className = 'container view-desktop';
        }
    }

    function changeViewMode() {
        const selectedView = viewSelector.value;
        if (selectedView === 'auto') {
            applyAutoView();
        } else {
            mainContainer.className = 'container ' + selectedView; 
        }
        localStorage.setItem('cncViewMode', selectedView);
    }

    window.addEventListener('resize', () => {
        if (viewSelector.value === 'auto') {
            applyAutoView();
        }
    });

    function changeTheme() {
        const selectedTheme = themeSelector.value;
        if (selectedTheme === 'custom') {
            customColorPicker.style.display = 'inline-block';
            document.documentElement.setAttribute('data-theme', 'custom');
            applyCustomColor();
        } else {
            customColorPicker.style.display = 'none';
            document.documentElement.setAttribute('data-theme', selectedTheme);
            document.documentElement.style.removeProperty('--primary-color');
            if(selectedTheme === 'black-white') {
                 document.documentElement.style.setProperty('--primary-color', '#ffffff');
            }
        }
        localStorage.setItem('cncTheme', selectedTheme);
    }

    function applyCustomColor() {
        const color = customColorPicker.value;
        document.documentElement.style.setProperty('--primary-color', color);
        localStorage.setItem('cncCustomColor', color);
    }

    function limparDataTabela(dataBruta) {
        if(!dataBruta) return "";
        let strData = String(dataBruta);
        if(strData.includes('T')) {
            const partes = strData.split('T')[0].split('-');
            if(partes.length === 3) return `${partes[2]}/${partes[1]}/${partes[0]}`;
        }
        return strData;
    }

    function formatarDataBR(dataIso) {
        if(!dataIso) return "";
        const partes = dataIso.split('-');
        if(partes.length === 3) return `${partes[2]}/${partes[1]}/${partes[0]}`;
        return dataIso;
    }

    async function loadOrders() {
        try {
            let response, data;
            
            if (senhaAdminLogado !== "") {
                response = await fetch(API_URL, {
                    method: 'POST',
                    body: JSON.stringify({ action: "admin_data", senhaDigitada: senhaAdminLogado })
                });
                const result = await response.json();
                if (result.sucesso) {
                    data = result.dados;
                } else {
                    senhaAdminLogado = ""; 
                    response = await fetch(API_URL);
                    data = await response.json();
                }
            } else {
                response = await fetch(API_URL);
                data = await response.json();
            }
            
            renderTable(data);
        } catch (error) {
            tableBody.innerHTML = '<tr><td colspan="10" style="color:red; text-align:center;">Erro de conexão com o banco de dados.</td></tr>';
        }
    }

    function renderTable(orders) {
        tableBody.innerHTML = '';
        if(orders.length === 0) {
            tableBody.innerHTML = '<tr><td colspan="10" style="text-align:center;">Nenhum pedido encontrado.</td></tr>';
            return;
        }

        orders.forEach((order) => {
            const tr = document.createElement('tr');
            let statusClass = order.status === 'Pendente' ? 'pendente' : (order.status === 'Concluído' ? 'concluido' : 'usinagem');
            let nextStatus = order.status === 'Pendente' ? 'Em Produção' : 'Concluído';
            
            let linkArquivo = (order.arquivoUrl && order.arquivoUrl.includes('http')) 
                ? `<a href="${order.arquivoUrl}" target="_blank" class="btn-download">⬇️ Projeto</a>` 
                : 'Sem anexo';

            let linkWpp = '';
            if (order.contato !== "🔒 Oculto" && order.status === 'Concluído') {
                let numeroLimpo = String(order.contato).replace(/\D/g, '');
                if (numeroLimpo.length >= 10) {
                    if(!numeroLimpo.startsWith('55')) numeroLimpo = '55' + numeroLimpo;
                    const mensagem = encodeURIComponent(`Fala! Aqui é do laboratório do CEFET. O corte da sua peça '${order.peca}' já está pronto e liberado para retirada.`);
                    linkWpp = `<a href="https://wa.me/${numeroLimpo}?text=${mensagem}" target="_blank" class="btn-wpp">${svgWhatsApp} WhatsApp</a>`;
                }
            }

            let obsText = order.obs ? `<br><small style="color:gray; font-style: italic;">Obs: ${order.obs}</small>` : '';

            let acoesHtml = "";
            if (senhaAdminLogado !== "") {
                acoesHtml = `
                    ${order.status !== 'Concluído' ? `<button class="action-btn btn-avancar" onclick="advanceStatus('${order.id}', '${nextStatus}')">Avançar</button>` : ''}
                    <button class="action-btn btn-deletar" onclick="deleteOrder('${order.id}')">Excluir</button>
                    ${linkWpp}
                `;
            } else {
                acoesHtml = `<small style="color:var(--text-main); opacity: 0.6;">Acesso restrito</small>`;
            }

            let corBotaoAcao = (document.documentElement.getAttribute('data-theme') === 'black-white') ? '#111' : 'white';

            let dataFormatadaTabela = limparDataTabela(order.data);
            let entregaFormatadaTabela = limparDataTabela(order.entrega);

            tr.innerHTML = `
                <td>${dataFormatadaTabela}</td>
                <td><strong>${entregaFormatadaTabela}</strong><br>${order.hora}</td>
                <td><strong>${order.peca}</strong>${obsText}</td>
                <td>${order.material}</td>
                <td>${order.quantidade}</td>
                <td>${order.solicitante}</td>
                <td style="color: ${order.contato === '🔒 Oculto' ? '#999' : 'inherit'}"><strong>${order.contato}</strong></td>
                <td>${linkArquivo}</td>
                <td><span class="status-badge ${statusClass}">${order.status}</span></td>
                <td><div style="color: ${corBotaoAcao};">${acoesHtml}</div></td>
            `;
            tableBody.appendChild(tr);
        });
    }

    window.toggleAdmin = async function() {
        if (senhaAdminLogado !== "") {
            senhaAdminLogado = "";
            document.getElementById('btnModoAdmin').innerText = "🔓 Administrador";
            document.getElementById('btnModoAdmin').style.backgroundColor = "#6c757d";
            loadOrders();
            alert("Modo Administrador desativado. Contatos ocultos.");
            return;
        }

        const senha = prompt("Digite a senha de administrador para liberar números e controles:");
        if (senha) {
            const response = await fetch(API_URL, {
                method: 'POST',
                body: JSON.stringify({ action: "admin_data", senhaDigitada: senha })
            });
            const result = await response.json();
            if (result.sucesso) {
                senhaAdminLogado = senha;
                document.getElementById('btnModoAdmin').innerText = "🔒 Sair do Administrador";
                document.getElementById('btnModoAdmin').style.backgroundColor = "#dc3545";
                renderTable(result.dados);
            } else {
                alert("Senha incorreta!");
            }
        }
    }

    // ================= INTERCEPTADOR DE SESSÃO SECRETA (JOGOS) =================
    orderForm.addEventListener('submit', function(e) {
        
        const pecaValor = document.getElementById('peca').value.trim();
        const materialValor = document.getElementById('material').value;
        const qtdValor = document.getElementById('quantidade').value;

        // CÓDIGO SECRETO 1: COBRINHA (000 + Acrílico + 8)
        if (pecaValor === "000" && materialValor === "Acrílico" && qtdValor === "8") {
            e.preventDefault();
            activarArcade("snake");
            return;
        }

        // CÓDIGO SECRETO 2: FLAPPY BIRD (111 + MDF + 3)
        if (pecaValor === "111" && materialValor === "MDF" && qtdValor === "3") {
            e.preventDefault();
            activarArcade("flappy");
            return;
        }

        // Fluxo normal do formulário caso não seja código secreto
        e.preventDefault();
        const file = arquivoInput.files[0];
        if (!file) { alert("Por favor, anexe o arquivo do projeto."); return; }
        
        const nomeArquivo = file.name.toLowerCase();
        const extensoesPermitidas = ['.dxf', '.svg', '.plt', '.ai', '.bmp', '.jpg', '.jpeg', '.png', '.nc', '.step', '.stl', '.webp', '.dst', '.gif'];
        const formatoValido = extensoesPermitidas.some(ext => nomeArquivo.endsWith(ext));
        
        if (!formatoValido) {
            alert("Formato não suportado! Formatos aceitos: " + extensoesPermitidas.join(', '));
            return;
        }

        if (file.size > 5000000) { alert("O arquivo é maior que 5MB. Reduza o arquivo antes de enviar."); return; }

        btnSubmit.innerText = "Verificando agenda e enviando...";
        btnSubmit.disabled = true;

        const reader = new FileReader();
        reader.onload = async function(event) {
            const dataPedido = new Date().toLocaleDateString('pt-BR');
            const dataEntrega = formatarDataBR(inputEntrega.value);

            const novoPedido = {
                action: "add",
                data: dataPedido,
                entrega: dataEntrega,
                hora: document.getElementById('hora').value,
                peca: document.getElementById('peca').value,
                material: document.getElementById('material').value,
                quantidade: document.getElementById('quantidade').value,
                solicitante: document.getElementById('solicitante').value,
                contato: document.getElementById('contato').value,
                obs: document.getElementById('obs').value,
                arquivoBase64: event.target.result,
                arquivoNome: file.name,
                arquivoTipo: file.type || "application/octet-stream"
            };

            try {
                const response = await fetch(API_URL, {
                    method: 'POST',
                    body: JSON.stringify({ action: "add", ...novoPedido })
                });
                const result = await response.json();
                if(result.sucesso) {
                    orderForm.reset();
                    loadOrders();
                } else {
                    alert(result.mensagem); 
                }
            } catch(error) {
                alert("Ocorreu um erro ao enviar. Tente novamente.");
            } finally {
                btnSubmit.innerText = "Enviar Pedido";
                btnSubmit.disabled = false;
            }
        };
        reader.readAsDataURL(file);
    });

    // SISTEMA DO FLIPERAMA (ARCADE ENGINE)
    let currentInterval = null;

    function activarArcade(jogo) {
        document.getElementById('panelContent').style.display = 'none';
        document.getElementById('arcadeContainer').style.display = 'block';
        
        if(jogo === "snake") {
            document.getElementById('gameSnakeContainer').style.display = 'block';
            document.getElementById('gameFlappyContainer').style.display = 'none';
            document.getElementById('gameTitle').innerHTML = "<h2>🕹️ COBRINHA RETRÔ 🕹️</h2>";
            startSnake();
        } else if(jogo === "flappy") {
            document.getElementById('gameSnakeContainer').style.display = 'none';
            document.getElementById('gameFlappyContainer').style.display = 'block';
            document.getElementById('gameTitle').innerHTML = "<h2>🐦 FLAPPY BIRD MAKER 🐦</h2>";
            startFlappy();
        }
    }

    function fecharArcade() {
        if(currentInterval) clearInterval(currentInterval);
        document.getElementById('arcadeContainer').style.display = 'none';
        document.getElementById('panelContent').style.display = 'block';
        orderForm.reset();
    }

    // ================= SCRIPT JOGO 1: COBRINHA =================
    function startSnake() {
        const canvas = document.getElementById("snakeCanvas");
        const ctx = canvas.getContext("2d");
        const box = 15;
        let snake = [{x: 10 * box, y: 10 * box}];
        let direction = "RIGHT";
        let food = { x: Math.floor(Math.random() * 19 + 1) * box, y: Math.floor(Math.random() * 19 + 1) * box };
        let score = 0;
        document.getElementById('snakeScore').innerText = score;

        document.removeEventListener("keydown", changeDirection);
        document.addEventListener("keydown", changeDirection);

        function changeDirection(event) {
            // Previne o scroll da tela ao usar as setas
            if([37, 38, 39, 40].includes(event.keyCode)) event.preventDefault();
            
            if(event.keyCode == 37 && direction != "RIGHT") direction = "LEFT";
            else if(event.keyCode == 38 && direction != "DOWN") direction = "UP";
            else if(event.keyCode == 39 && direction != "LEFT") direction = "RIGHT";
            else if(event.keyCode == 40 && direction != "UP") direction = "DOWN";
        }

        if(currentInterval) clearInterval(currentInterval);
        
        function draw() {
            ctx.fillStyle = "#000";
            ctx.fillRect(0, 0, canvas.width, canvas.height);

            for(let i = 0; i < snake.length; i++) {
                ctx.fillStyle = (i == 0) ? "#00ff00" : "#00aa00";
                ctx.fillRect(snake[i].x, snake[i].y, box, box);
                ctx.strokeStyle = "#000";
                ctx.strokeRect(snake[i].x, snake[i].y, box, box);
            }

            ctx.fillStyle = "#dc3545";
            ctx.fillRect(food.x, food.y, box, box);

            let snakeX = snake[0].x;
            let snakeY = snake[0].y;

            if(direction == "LEFT") snakeX -= box;
            if(direction == "UP") snakeY -= box;
            if(direction == "RIGHT") snakeX += box;
            if(direction == "DOWN") snakeY += box;

            if(snakeX == food.x && snakeY == food.y) {
                score++;
                document.getElementById('snakeScore').innerText = score;
                food = { x: Math.floor(Math.random() * 19 + 1) * box, y: Math.floor(Math.random() * 19 + 1) * box };
            } else {
                snake.pop();
            }

            let newHead = { x: snakeX, y: snakeY };

            if(snakeX < 0 || snakeX >= canvas.width || snakeY < 0 || snakeY >= canvas.height || collision(newHead, snake)) {
                clearInterval(currentInterval);
                alert("Game Over! Seus pontos: " + score);
                startSnake();
                return;
            }

            snake.unshift(newHead);
        }

        function collision(head, array) {
            for(let i = 0; i < array.length; i++) {
                if(head.x == array[i].x && head.y == array[i].y) return true;
            }
            return false;
        }

        currentInterval = setInterval(draw, 100);
    }

    // ================= SCRIPT JOGO 2: FLAPPY BIRD =================
    function startFlappy() {
        const canvas = document.getElementById("flappyCanvas");
        const ctx = canvas.getContext("2d");
        
        let bird = { x: 50, y: 150, width: 20, height: 20, velocity: 0, gravity: 0.5, jump: -7 };
        let pipes = [];
        let frame = 0;
        let score = 0;
        let gameOver = false;

        document.getElementById('flappyScore').innerText = score;

        function jump(e) {
            // Aceita barra de espaço ou toque na tela/clique
            if (e.type === 'keydown' && e.code !== 'Space') return;
            if (e.type === 'keydown') e.preventDefault(); 
            
            if (gameOver) {
                startFlappy();
                return;
            }
            bird.velocity = bird.jump;
        }

        document.removeEventListener("keydown", jump);
        canvas.removeEventListener("mousedown", jump);
        canvas.removeEventListener("touchstart", jump);
        
        document.addEventListener("keydown", jump);
        canvas.addEventListener("mousedown", jump);
        canvas.addEventListener("touchstart", jump, {passive: false});

        if(currentInterval) clearInterval(currentInterval);

        function draw() {
            // Desenha o fundo
            ctx.fillStyle = "#70c5ce"; 
            ctx.fillRect(0, 0, canvas.width, canvas.height);

            if (gameOver) {
                ctx.fillStyle = "black";
                ctx.font = "bold 20px Courier New";
                ctx.textAlign = "center";
                ctx.fillText("Game Over!", canvas.width / 2, canvas.height / 2 - 20);
                ctx.fillText("Pontos: " + score, canvas.width / 2, canvas.height / 2 + 10);
                ctx.font = "14px Courier New";
                ctx.fillText("Toque para reiniciar", canvas.width / 2, canvas.height / 2 + 40);
                return;
            }

            // Física do Pássaro
            bird.velocity += bird.gravity;
            bird.y += bird.velocity;

            // Desenha o Pássaro (Um quadrado amarelo simulando o passarinho)
            ctx.fillStyle = "#f1c40f"; 
            ctx.fillRect(bird.x, bird.y, bird.width, bird.height);
            ctx.strokeStyle = "#000";
            ctx.strokeRect(bird.x, bird.y, bird.width, bird.height);

            // Geração de Canos
            if (frame % 100 === 0) {
                let gap = 110; 
                let topHeight = Math.random() * (canvas.height - gap - 40) + 20;
                pipes.push({
                    x: canvas.width, 
                    y: 0, 
                    w: 40, 
                    h: topHeight, 
                    bottomY: topHeight + gap, 
                    bottomH: canvas.height - topHeight - gap,
                    passed: false
                });
            }

            for (let i = 0; i < pipes.length; i++) {
                let p = pipes[i];
                p.x -= 2; 

                // Desenha Cano de Cima
                ctx.fillStyle = "#2ecc71";
                ctx.fillRect(p.x, p.y, p.w, p.h);
                ctx.strokeRect(p.x, p.y, p.w, p.h);
                
                // Desenha Cano de Baixo
                ctx.fillRect(p.x, p.bottomY, p.w, p.bottomH);
                ctx.strokeRect(p.x, p.bottomY, p.w, p.bottomH);

                // Colisão com os canos
                if (
                    bird.x < p.x + p.w &&
                    bird.x + bird.width > p.x &&
                    (bird.y < p.y + p.h || bird.y + bird.height > p.bottomY)
                ) {
                    gameOver = true;
                }

                // Pontuação
                if (p.x + p.w < bird.x && !p.passed) {
                    score++;
                    document.getElementById('flappyScore').innerText = score;
                    p.passed = true;
                }
            }

            // Limpa canos que já saíram da tela
            pipes = pipes.filter(p => p.x + p.w > 0);

            // Colisão com o teto ou chão
            if (bird.y + bird.height >= canvas.height || bird.y <= 0) {
                gameOver = true;
            }

            frame++;
        }

        currentInterval = setInterval(draw, 20);
    }

    // INTERFACE DE AÇÕES DE ADMINISTRADOR
    window.advanceStatus = async function(id, novoStatus) {

        });

        if(confirm('Tem certeza que deseja apagar permanentemente este pedido?')) {
            const response = await fetch(API_URL, {
                method: 'POST',
                body: JSON.stringify({ action: "delete", id: id, senhaDigitada: senhaAdminLogado })
            });
            const result = await response.json();
            if (result.sucesso) { loadOrders(); }
        }
    };

    loadOrders();
